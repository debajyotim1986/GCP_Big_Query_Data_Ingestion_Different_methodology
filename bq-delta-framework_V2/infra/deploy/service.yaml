# infra/deploy/service.yaml
# Declarative Cloud Run service spec
# Deploy with: gcloud run services replace infra/deploy/service.yaml --region us-central1

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bq-delta-dashboard
  annotations:
    run.googleapis.com/ingress: internal-and-cloud-load-balancing
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"    # always-warm — no cold start
        autoscaling.knative.dev/maxScale: "3"    # cap horizontal scale
    spec:
      serviceAccountName: dashboard-sa@my-project-dev.iam.gserviceaccount.com
      containers:
        - image: us-central1-docker.pkg.dev/my-project-dev/bq-delta-images/bq-delta-dashboard:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name:  GCP_PROJECT
              value: my-project-dev
            - name:  FRAMEWORK_DATASET
              value: framework_config
            - name:  BQ_LOCATION
              value: US
            - name:  LOG_FORMAT
              value: json
            - name:  LOG_LEVEL
              value: INFO
            - name:  CACHE_TTL_SECONDS
              value: "60"
          livenessProbe:
            httpGet:
              path: /health       # no BQ call — responds immediately
            initialDelaySeconds: 10
            periodSeconds:       30
